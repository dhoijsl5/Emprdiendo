<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea tu cuenta</title>
     <link rel="stylesheet" href="/css/style.css">
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="body-registro">
     
       <video autoplay loop muted playsinline class="video-fondo-pantalla">
             <source src="/img/video.mp4" type="video/mp4"> <!-- Cambia /img/tu-video.mp4 por tu ruta real -->
             Tu navegador no soporta videos de fondo.
       </video>

       <div class="capa-filtro-video"></div>

  <button class="btn-volver">Volver></button>
    <div class="container">
        <h1>Iniciar sesion</h1>
        <form>
          <div class="input-box">
            <input type="text" placeholder="Nombre del usuario" required>
            <i class='bx bxs-user'></i>
          </div>  
          <div class="input-box">
            <input type="password" placeholder="Contraseña" required>
            <i class='bx bxs-lock alt'></i>
          </div> 
          <div class="remember-password">
            <label><input type="checkbox">Recordarme</label>
            <a href="#">¿Olvidaste tu contraseña?</a>
          </div>


          <button class="btn-ingresar">Ingresar</button>

          <p class="register-link">¿Todavia no tienes una cuenta?<a href="#">Registrate</a></p>

        </form>
    <button class="mi-boton-enviar">Registrarse</button>
</div>
</body>
</html>
